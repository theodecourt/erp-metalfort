name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install system deps for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0
      - name: Install deps
        run: cd backend && uv sync
      - name: Test (unit only — skip integration)
        run: cd backend && uv run pytest -k "not integration" -v
      - name: Lint
        run: cd backend && uv run ruff check .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - name: Install
        run: cd frontend && npm ci
      - name: Unit tests
        run: cd frontend && npm test -- --run
      - name: Build
        run: cd frontend && npm run build

  parity:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Verify fixtures exist in both sides
        run: |
          test -f database/tests/formula-fixtures.json
          test -f database/tests/variables-fixtures.json
